<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Gallery - Adminify Bootstrap Dashboard Template</title>

    <!-- Icomoon Font Icons css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/icomoon/style.css') }}" />

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/main.min.css') }}" />
  </head>

  <body class="bg-dark">
    <!-- Container start -->
    <div id="app" class="container">
      <div class="row justify-content-center">
        <div class="col-xl-4 col-lg-5 col-sm-6 col-12">
          <form v-show="active_ui === 1" class="my-5">
            <div class="bg-white rounded-3 p-4">
              <div class="login-form">
                <a href="index.html" class="mb-4 d-flex">
                  <img src="{{ url_for('static', filename='assets/images/logo-dark.svg') }}" class="img-fluid login-logo" alt="AdminPro Admin Dashboard" />
                </a>
                <h4 class="my-4">Login</h4>
                <div class="mb-3">
                  <label class="form-label">Your Email <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" v-model.trim="admin.username"
                    placeholder="Enter your email" />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="pwd">Your Password<span class="text-danger">*</span></label>
                  <input type="password" class="form-control"  v-model.trim="admin.password" placeholder="Enter password" />
                </div>
                <div class="d-flex align-items-center justify-content-between">
                  <div class="m-0">
                    &nbsp;
                  </div>
                  <a href="forgot-password.html" class="text-primary text-decoration-underline">Lost password?</a>
                </div>
                <div class="d-grid py-3 mt-3">
                  <button type="button" @click="login" class="btn btn-lg btn-primary">
                    LOGIN
                  </button>
                </div>
              </div>
            </div>
          </form>
          <form v-show="active_ui === 2" class="my-5" style="display:none;">
            <div class="bg-white rounded-3 p-4">
              <div class="login-form">
                <a href="index.html" class="mb-4 d-flex">
                  <img src="{{ url_for('static', filename='assets/images/logo-dark.svg') }}" class="img-fluid login-logo" alt="AdminPro Admin Dashboard" />
                </a>
                <h4 class="my-4">Reset Password</h4>
                <div class="mb-3">
                  <label class="form-label">Your Email <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" v-model.trim="reset.username"
                    placeholder="Enter your email" />
                </div>
                <div class="d-flex align-items-center justify-content-between">
                  <div class="m-0">
                    &nbsp;
                  </div>
                  <a class="text-primary text-decoration-underline" @click="active_ui = 1">To Login</a>
                </div>
                <div class="d-grid py-3 mt-3">
                  <button type="button" @click="reset" class="btn btn-lg btn-primary">
                    SUBMIT
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <!-- Container end -->
    <script src="{{ url_for('static', filename='assets/js/vue.global.prod.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/axios.min.js') }}"></script>
    <script>
      const { createApp } = Vue;
      createApp({
        data() {
          return {
            active_ui: 1,
            admin: {
              username: "",
              password: ""
            },
            reset: {
              username: ""
            },
          }
        },
        methods: {
          async login() {
            if(this.admin.username === "")
            {
              alert("Invalid email");
              return;
            }

            if(this.admin.password === "")
            {
              alert("Invalid password");
              return;
            }
            
            try {
              const response = await axios.post("/auth/login", this.admin);
              data = response.data;
              if(response.data.status == "T") window.location.href = "/";
              else {
                  alert("Invalid username or password");
              }
            }
            catch(error) {
              console.log(error);
            }
          }
        },
        async reset() {
          if(this.reset.username === "")
          {
            alert("Invalid email");
            return;
          }
          alert("Under construction");
        },
        delimiters: ["{","}"]
      }).mount('#app');
    </script>
  </body>

</html>
